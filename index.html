<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>台北兒童福利中心 - 資訊看板</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts 需要網路；離線時此行可移除，fallback 為系統字體 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet" />
</head>

<body>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  主容器 (設計稿尺寸 1080 × 1920，以 scale 適配螢幕)         -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <div id="app-root">

    <!-- ▌HEADER ──────────────────────────────────────────────── -->
    <header class="header">

      <!-- Logo (點擊跳轉至 1F 樓層平面圖) -->
      <a class="logo-wrap" href="index.html">
        <img src="images/logo.png" alt="台北兒童福利中心">
      </a>

      <!-- 時鐘 -->
      <div class="clock-pill">
        <span class="clock-icon">
          <!-- 時鐘 SVG icon -->
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="16" stroke="#333" stroke-width="2" />
            <line x1="18" y1="10" x2="18" y2="18" stroke="#333" stroke-width="2.5" stroke-linecap="round" />
            <line x1="18" y1="18" x2="24" y2="22" stroke="#333" stroke-width="2.5" stroke-linecap="round" />
            <circle cx="18" cy="18" r="2" fill="#333" />
          </svg>
        </span>
        <span id="clock-ampm" class="clock-ampm">上午</span>
        <span id="clock-time" class="clock-time">10:00</span>
        <span class="clock-sep">|</span>
        <span id="clock-weekday" class="clock-weekday">星期四</span>
        <span id="clock-date" class="clock-date">12/8</span>
      </div>

      <!-- 天氣 -->
      <div class="weather-pill">
        <!-- 天氣圖示 (SVG inline) -->
        <span class="weather-icon">
          <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="22" cy="18" r="10" fill="#f7c948" />
            <ellipse cx="16" cy="30" rx="9" ry="6" fill="white" stroke="#ccc" stroke-width="1" />
            <ellipse cx="24" cy="32" rx="12" ry="7" fill="white" stroke="#ccc" stroke-width="1" />
          </svg>
        </span>
        <div class="weather-info">
          <span id="weather-condition" class="weather-condition">晴時多雲</span>
          <span id="weather-temp" class="weather-temp">25˚C</span>
        </div>
      </div>

    </header>

    <!-- ▌HERO 建築圖 ──────────────────────────────────────────── -->
    <section class="hero-section">
      <div class="hero-image-wrap">
        <div class="hero-city-art">
          <img src="images/carousel_1.png" alt="">
        </div>
      </div>
      <!-- 輪播指示點 -->
      <div class="carousel-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </section>

    <!-- ▌INFO CARDS 區域 ─────────────────────────────────────── -->
    <main class="cards-area">

      <!-- ── 環境監測卡 ──────────────────────────────── -->
      <article class="card env-card">
        <div class="card-icon-col">
          <div class="card-icon">
            <!-- 環境 icon (SVG) -->
            <!-- <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M28 8 C18 8 10 16 10 26 C10 34 14 40 20 44 L28 48 L36 44 C42 40 46 34 46 26 C46 16 38 8 28 8Z" fill="#b0d4c8" stroke="#406c76" stroke-width="2"/>

          </svg> -->
            <svg xmlns="http://www.w3.org/2000/svg" width="87" height="74" viewBox="0 0 87 74" fill="none">
              <path
                d="M74.8861 46.1222C81.625 46.4398 87 52.5585 87 60.0617C87 67.5648 81.625 73.6823 74.8861 74V69.1394C79.1909 68.8271 82.5949 64.8837 82.5949 60.0617C82.5949 55.2397 79.1909 51.2962 74.8861 50.9839V50.9614H0V46.108H74.8861V46.1222ZM56.7152 10.9274C64.575 10.9275 70.9464 17.4466 70.9467 25.4878C70.9467 33.5293 64.5751 40.0482 56.7152 40.0482C56.5308 40.0482 56.3473 40.0425 56.1646 40.0352V40.0411H0V35.1877H55.0633V35.1509C55.5795 35.1779 56.1294 35.1943 56.7152 35.1948C61.9551 35.1947 66.2029 30.8488 66.2029 25.4878C66.2026 20.1271 61.955 15.7809 56.7152 15.7809C56.1517 15.7809 55.5998 15.8338 55.0633 15.9302V11.0258C55.6052 10.9617 56.1565 10.9274 56.7152 10.9274ZM32.4873 0C39.4818 0 45.1519 6.2473 45.1519 13.9537C45.1519 21.4568 39.7769 27.5744 33.038 27.892V27.9074H0V23.054H31.9367V23.0315C32.1188 23.0447 32.3023 23.054 32.4873 23.054C37.0489 23.054 40.7468 18.9797 40.7468 13.9537C40.7468 8.92779 37.0489 4.85347 32.4873 4.85347C32.3023 4.85347 32.1188 4.86278 31.9367 4.87598V0.0142191C32.1193 0.00561243 32.3028 0 32.4873 0Z"
                fill="#406C76" />
            </svg>
          </div>
          <p class="card-label">環境</p>
        </div>
        <div class="card-content env-content">
          <!-- 動態產生 by JS -->
        </div>
        <div class="card-arrow">›</div>
      </article>

      <!-- ── 公告卡 ───────────────────────────────────── -->
      <article class="card notice-card">
        <div class="card-icon-col">
          <div class="card-icon">
            <!-- <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="10" y="10" width="36" height="36" rx="4" fill="#b0d4c8" stroke="#406c76" stroke-width="2" />
              <line x1="18" y1="22" x2="38" y2="22" stroke="#406c76" stroke-width="2.5" stroke-linecap="round" />
              <line x1="18" y1="29" x2="38" y2="29" stroke="#406c76" stroke-width="2.5" stroke-linecap="round" />
              <line x1="18" y1="36" x2="30" y2="36" stroke="#406c76" stroke-width="2.5" stroke-linecap="round" />
            </svg> -->
            <svg xmlns="http://www.w3.org/2000/svg" width="84" height="77" viewBox="0 0 84 77" fill="none">
              <line x1="17.2305" y1="15.3691" x2="67.3228" y2="15.3691" stroke="#406C76" stroke-width="4" />
              <line x1="17.2305" y1="26.7534" x2="67.3228" y2="26.7534" stroke="#406C76" stroke-width="4" />
              <line x1="17.2305" y1="39.2778" x2="49.1074" y2="39.2778" stroke="#406C76" stroke-width="4" />
              <path
                d="M2 3V73.1789C2 74.1209 3.18349 74.5404 3.77676 73.8087L18.7768 55.3087C18.9666 55.0745 19.252 54.9385 19.5535 54.9385H80.1231C80.6754 54.9385 81.1231 54.4907 81.1231 53.9385V3C81.1231 2.44772 80.6754 2 80.1231 2H3C2.44772 2 2 2.44771 2 3Z"
                stroke="#406C76" stroke-width="4" stroke-linecap="round" />
            </svg>
          </div>
          <p class="card-label">公告</p>
        </div>
        <div class="card-content notice-content">
          <!-- 動態產生 by JS -->
        </div>
        <div class="card-arrow">›</div>
      </article>

      <!-- ── 交通資訊卡 ─────────────────────────────────── -->
      <article class="card transit-card">
        <div class="card-icon-col">
          <div class="card-icon">
            <!-- <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="10" y="12" width="36" height="30" rx="6" fill="#b0d4c8" stroke="#406c76" stroke-width="2" />
              <rect x="14" y="16" width="28" height="16" rx="3" fill="white" opacity=".7" />
              <circle cx="17" cy="46" r="4" fill="#406c76" />
              <circle cx="39" cy="46" r="4" fill="#406c76" />
              <line x1="10" y1="36" x2="46" y2="36" stroke="#406c76" stroke-width="2" />
            </svg> -->
            <svg xmlns="http://www.w3.org/2000/svg" width="63" height="74" viewBox="0 0 63 74" fill="none">
              <g clip-path="url(#clip0_161_56)">
                <path
                  d="M31.5 0C49.05 0 63 5.0875 63 11.5625V13.875V60.125C63 62.6832 60.9891 64.75 58.5 64.75V69.375C58.5 71.9332 56.4891 74 54 74H49.5C47.0109 74 45 71.9332 45 69.375V64.75H18V69.375C18 71.9332 15.9891 74 13.5 74H9C6.51094 74 4.5 71.9332 4.5 69.375V64.75C2.01094 64.75 0 62.6832 0 60.125V13.875V11.5625C0 5.0875 13.95 0 31.5 0ZM9 18.5V37C9 39.5582 11.0109 41.625 13.5 41.625H49.5C51.9891 41.625 54 39.5582 54 37V18.5C54 15.9418 51.9891 13.875 49.5 13.875H13.5C11.0109 13.875 9 15.9418 9 18.5ZM11.25 57.8125C12.4435 57.8125 13.5881 57.3252 14.432 56.4579C15.2759 55.5905 15.75 54.4141 15.75 53.1875C15.75 51.9609 15.2759 50.7845 14.432 49.9171C13.5881 49.0498 12.4435 48.5625 11.25 48.5625C10.0565 48.5625 8.91193 49.0498 8.06802 49.9171C7.22411 50.7845 6.75 51.9609 6.75 53.1875C6.75 54.4141 7.22411 55.5905 8.06802 56.4579C8.91193 57.3252 10.0565 57.8125 11.25 57.8125ZM51.75 57.8125C52.9435 57.8125 54.0881 57.3252 54.932 56.4579C55.7759 55.5905 56.25 54.4141 56.25 53.1875C56.25 51.9609 55.7759 50.7845 54.932 49.9171C54.0881 49.0498 52.9435 48.5625 51.75 48.5625C50.5565 48.5625 49.4119 49.0498 48.568 49.9171C47.7241 50.7845 47.25 51.9609 47.25 53.1875C47.25 54.4141 47.7241 55.5905 48.568 56.4579C49.4119 57.3252 50.5565 57.8125 51.75 57.8125Z"
                  fill="#406C76" />
              </g>
              <defs>
                <clipPath id="clip0_161_56">
                  <rect width="63" height="74" fill="white" />
                </clipPath>
              </defs>
            </svg>
          </div>
          <p class="card-label">公車</p>
        </div>
        <div class="card-content transit-content">
          <!-- 動態產生 by JS -->
        </div>
        <div class="card-arrow">›</div>
      </article>

      <!-- ── 園區導覽卡 ─────────────────────────────────── -->
      <article class="card guide-card">
        <div class="card-icon-col">
          <div class="card-icon">
            <!-- <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="14" y="8" width="28" height="36" rx="4" fill="#b0d4c8" stroke="#406c76" stroke-width="2" />
              <rect x="22" y="32" width="12" height="12" rx="2" fill="#406c76" opacity=".6" />
              <line x1="14" y1="22" x2="42" y2="22" stroke="#406c76" stroke-width="2" />
              <rect x="8" y="20" width="6" height="24" rx="2" fill="#406c76" opacity=".35" />
              <rect x="42" y="20" width="6" height="24" rx="2" fill="#406c76" opacity=".35" />
            </svg> -->
            <svg xmlns="http://www.w3.org/2000/svg" width="85" height="78" viewBox="0 0 85 78" fill="none">
              <path d="M2 40.8432L41.106 2.28795C41.4934 1.906 42.1151 1.90382 42.5052 2.28306L82.1671 40.8432"
                stroke="#406C76" stroke-width="4" stroke-linecap="round" />
              <path
                d="M10.9697 41.9639V73.6004C10.9697 74.705 11.8652 75.6004 12.9697 75.6004H70.0761C71.1806 75.6004 72.0761 74.705 72.0761 73.6004V41.9639"
                stroke="#406C76" stroke-width="4" />
              <rect x="31.0762" y="30.6763" width="21.8069" height="12.7207" rx="1" stroke="#406C76" stroke-width="4" />
              <rect x="31.0762" y="52.4834" width="21.8069" height="12.7207" rx="1" stroke="#406C76" stroke-width="4" />
            </svg>
          </div>
          <p class="card-label">導覽</p>
        </div>
        <div class="card-content guide-content">
          <div class="floor-tabs" id="floor-tabs">
            <!-- 動態產生 by JS -->
          </div>
          <div class="floor-detail" id="floor-detail">
            <!-- 動態產生 by JS -->
          </div>
        </div>
        <div class="card-arrow">›</div>
      </article>

    </main>
  </div><!-- /#app-root -->

  <script src="mock.js"></script>
  <script src="app.js"></script>
</body>

</html>
